<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#1a202e"/>
  <g transform="translate(200, 200)">
    <!-- Soft glow background circles -->
    <circle cx="0" cy="-20" r="100" fill="#2dd4bf" opacity="0.05"/>
    <circle cx="0" cy="-20" r="70" fill="#2dd4bf" opacity="0.08"/>
    
    <!-- Sun -->
    <circle cx="30" cy="-50" r="35" fill="#fbbf24" filter="url(#glow)"/>
    <g opacity="0.6">
      <circle cx="30" cy="-50" r="45" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <circle cx="30" cy="-50" r="52" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    </g>
    
    <!-- Main cloud with rounded smooth shape -->
    <g filter="url(#glow)">
      <ellipse cx="-35" cy="15" rx="35" ry="28" fill="#2dd4bf"/>
      <ellipse cx="-5" cy="5" rx="42" ry="35" fill="#2dd4bf"/>
      <ellipse cx="25" cy="12" rx="32" ry="26" fill="#2dd4bf"/>
      <rect x="-70" y="15" width="130" height="40" rx="20" fill="#2dd4bf"/>
    </g>
    
    <!-- Temperature indicator rounded card -->
    <g transform="translate(0, 75)">
      <rect x="-45" y="-20" width="90" height="40" rx="20" fill="#2dd4bf" opacity="0.2"/>
      <rect x="-42" y="-17" width="84" height="34" rx="17" fill="none" stroke="#2dd4bf" stroke-width="2"/>
      <!-- Temperature display -->
      <circle cx="-18" cy="0" r="8" fill="none" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="-18" y1="-5" x2="-18" y2="-3" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/>
      <line x1="-18" y1="3" x2="-18" y2="5" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/>
      <line x1="-23" y1="0" x2="-21" y2="0" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/>
      <line x1="-15" y1="0" x2="-13" y2="0" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/>
      <text x="12" y="6" font-family="monospace" font-size="20" font-weight="600" fill="#2dd4bf" text-anchor="middle">25°</text>
    </g>
  </g>
</svg>
