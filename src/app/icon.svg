<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Gradient border ring -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#borderGrad)"/>
  <!-- Light violet-tinted inner background -->
  <rect x="3" y="3" width="94" height="94" rx="19.5" ry="19.5" fill="#f5f3ff"/>
  <!-- Bold gradient RB matching hero text-gradient -->
  <text
    x="50"
    y="72"
    font-family="system-ui, -apple-system, 'Inter', sans-serif"
    font-weight="900"
    font-size="56"
    text-anchor="middle"
    fill="url(#textGrad)">RB</text>
</svg>
